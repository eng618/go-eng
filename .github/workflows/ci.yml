name: build-test-lint
on:
  push:
    tags: [v*]
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test_matrix:
    name: Go ${{ matrix.go }} – test/build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go: ["1.24", "1.25", "1.26"]
    env:
      # older releases don't understand a go.work file; disable it so the
      # checkout behaves like a single-module project.  we validate the
      # repository against multiple Go versions so we know when API/encoding
      # changes break backwards compatibility.
      GOWORK: off
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: task test

      - name: Build
        run: task build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out

  lint:
    name: Lint (latest Go)
    runs-on: ubuntu-latest
    needs: test_matrix
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # keeping "latest" here ensures the action itself keeps up with
          # newer lint releases; it's run on the newest Go so compatibility
          # problems from the matrix are already covered by the previous job.
          version: latest

      - name: Lint
        run: task lint
