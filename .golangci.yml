version: "2"
run:
  go: "1.26"
  modules-download-mode: readonly
  allow-parallel-runners: false
  timeout: 5m
  relative-path-mode: gomod

output:
  formats:
    text:
      path: stdout
    json:
      path: ./linter-output.json
  path-mode: abs

linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - copyloopvar
    - cyclop
    - decorder
    - errorlint
    - godot
    - gosec
    - importas
    - misspell
    - revive
    - whitespace
  settings:
    misspell:
      locale: US

issues:
  # Disable filter and show all errors defaults to 3
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/eng618/go-eng)
      custom-order: true
    gofmt:
      simplify: true
    gofumpt:
      module-path: github.com/eng618/go-eng
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/eng618/go-eng
    golines:
      max-len: 120
